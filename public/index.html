<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>وكيل تحليلات التجارة الإلكترونية</title>
  <meta name="description" content="وكيل ذكي لتحليل بيانات مبيعات التجارة الإلكترونية مع توصيات مدعومة بالذكاء الاصطناعي." />
  <meta name="theme-color" content="#2563eb" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --yellow: #f5b400;
      --ink: #1e293b;
      --muted: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #fffdf5 0%, #fef6e0 50%, #e8f1ff 100%);
      color: var(--ink);
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: #ffffff;
      border-radius: 24px;
      padding: 48px 36px;
      text-align: center;
      box-shadow: 0 18px 48px rgba(37, 99, 235, 0.12);
      border: 1px solid rgba(0, 0, 0, 0.05);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--blue) 0%, #3b82f6 45%, var(--yellow) 100%);
    }
    .badge {
      display: inline-block;
      background: rgba(37, 99, 235, 0.1);
      color: var(--blue-dark);
      font-weight: 700;
      font-size: 13px;
      padding: 6px 16px;
      border-radius: 999px;
      margin-bottom: 20px;
    }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 14px; line-height: 1.4; }
    p { color: var(--muted); font-size: 16px; line-height: 1.9; margin-bottom: 28px; }
    .cta {
      display: inline-block;
      background: linear-gradient(135deg, var(--blue), var(--blue-dark));
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      padding: 14px 32px;
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .cta:hover { transform: translateY(-2px); box-shadow: 0 12px 26px rgba(37, 99, 235, 0.34); }
    .note { margin-top: 24px; font-size: 13px; color: var(--muted); }
    .note code {
      background: #fef6e0;
      color: #b45309;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">Streamlit · FastAPI · Gemini</span>
    <h1>وكيل تحليلات التجارة الإلكترونية</h1>
    <p>
      هذا التطبيق يعمل كخدمة Python (Streamlit) ويتم استضافته على Render.
      اضغط الزر أدناه للانتقال إلى التطبيق المباشر.
    </p>
    <a class="cta" id="liveLink" href="https://ecommerce-analytics.onrender.com" target="_blank" rel="noopener">
      فتح التطبيق المباشر
    </a>
    <p class="note">
      إذا كان رابط الاستضافة مختلفاً، حدّث عنوان Render في الملف <code>public/index.html</code>.
    </p>
  </main>
</body>
</html>
