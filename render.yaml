services:
  - type: web
    name: ecommerce-analytics
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app/frontend/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
